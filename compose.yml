version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: michelin_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-michelin_app}
    ports:
      - "5434:5432"  # Acesso externo via porta 5434
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - michelin_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: michelin_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432  # Comunicação interna entre containers é sempre 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-michelin_app}
      PORT: 5000
      FRONTEND_URL: http://localhost:8080 # Necessário para o CORS do backend
    ports:
      - "5002:5000"  # Acesso externo da API via porta 5002
    networks:
      - michelin_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Injeta a URL da API durante o build do Vite
        - VITE_API_URL=http://localhost:5002
    container_name: michelin_frontend
    depends_on:
      - backend
    ports:
      - "8080:5173"  # Acesso externo do app via porta 8080
    networks:
      - michelin_network
    environment:
      - VITE_API_URL=http://localhost:5002
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  michelin_network:
    driver: bridge
